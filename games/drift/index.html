<!DOCTYPE html>
<html>
<body style="margin:0; background:#111; overflow:hidden;">
<div id="s" style="position:absolute; color:#0f0; font:20px monospace; top:10px; left:10px;">Score: 0</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w, h, playerX, score=0, obstacles=[], pressing=false;
function init(){ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; playerX=w/2; }
window.addEventListener('mousedown', ()=>pressing=true); window.addEventListener('mouseup', ()=>pressing=false);
function draw(){
  ctx.fillStyle='#111'; ctx.fillRect(0,0,w,h);
  playerX += pressing ? 5 : -5;
  ctx.fillStyle='#0f0'; ctx.fillRect(playerX, h-50, 30, 30);
  if(Math.random()<0.05) obstacles.push({x:Math.random()*w, y:-50});
  obstacles.forEach((o,i)=>{ o.y+=7; ctx.fillStyle='#f00'; ctx.fillRect(o.x, o.y, 40, 40);
    if(o.y>h){ obstacles.splice(i,1); score++; document.getElementById('s').innerText="Score: "+score; }
    if(o.y>h-80 && o.x<playerX+30 && o.x+40>playerX) location.reload();
  });
  if(playerX<0 || playerX>w) location.reload();
  requestAnimationFrame(draw);
}
init(); draw();
</script>
</body>
</html>
